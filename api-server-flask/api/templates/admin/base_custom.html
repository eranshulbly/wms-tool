{% extends 'admin/base.html' %}

{% block head_tail %}
{{ super() }}
<style>
  .navbar-brand { font-weight: bold; }
  .table th { background-color: #f8f9fa; }
  .badge-pending { background-color: #ffc107; color: #000; }
  .badge-active  { background-color: #28a745; color: #fff; }
  .badge-blocked { background-color: #dc3545; color: #fff; }
</style>
{% endblock %}

{% block access_control %}
{% if session.get('admin_logged_in') %}
<div class="navbar-text mr-3 text-light">{{ session.get('admin_username', '') }}</div>
<a class="btn btn-outline-light btn-sm" href="{{ url_for('admin.logout_view') }}">Logout</a>
{% endif %}
{% endblock %}
