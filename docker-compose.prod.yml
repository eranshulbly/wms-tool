version: '3.8'

# =============================================================================
# WMS Tool - Production Overrides (optimised for t3.micro / 1GB RAM)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Images are pulled from Docker registry (built by CI on git tag push)
# =============================================================================

services:
  backend:
    image: ${DOCKER_REGISTRY}/wms-backend:${APP_VERSION:-latest}
    mem_limit: 150m
    memswap_limit: 150m       # disable swap for this container

  frontend:
    image: ${DOCKER_REGISTRY}/wms-frontend:${APP_VERSION:-latest}
    mem_limit: 32m
    memswap_limit: 32m

  mysql_db:
    mem_limit: 320m
    memswap_limit: 320m

  nginx:
    volumes:
      - ./nginx/prod:/etc/nginx/conf.d:ro
    mem_limit: 24m
    memswap_limit: 24m
