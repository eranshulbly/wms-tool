version: '3.8'

# =============================================================================
# WMS Tool - Development Overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

services:
  mysql_db:
    ports:
      - "3307:3306"    # expose for local tools (TablePlus, DBeaver, etc.)

  backend:
    build:
      context: ./api-server-flask
      dockerfile: Dockerfile
    volumes:
      - ./api-server-flask:/app   # hot reload
    environment:
      DEBUG: "True"
      FLASK_ENV: development
    ports:
      - "5000:5000"               # direct access for debugging

  frontend:
    build:
      context: ./react-ui
      dockerfile: Dockerfile       # dev Dockerfile (npm start with hot reload)
    volumes:
      - ./react-ui/src:/app/src   # hot reload
      - ./react-ui/public:/app/public
    ports:
      - "3000:3000"               # direct CRA dev server access
    environment:
      CHOKIDAR_USEPOLLING: "true"

  # PHPMyAdmin only in dev
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: wms_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql_db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - db_network

  nginx:
    ports:
      - "5001:80"     # dev nginx on 5001 to avoid conflicts
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
