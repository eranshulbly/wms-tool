name: Build & Publish Docker Images on Tag

# Triggers when you push a version tag like: git tag 1.2.0 && git push origin 1.2.0
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'   # matches: 1.0.0, 1.2.3, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/wms-backend
  IMAGE_FRONTEND: ${{ github.repository_owner }}/wms-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./api-server-flask
          file: ./api-server-flask/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./react-ui
          file: ./react-ui/Dockerfile.prod
          push: true
          build-args: |
            REACT_APP_VERSION=${{ steps.version.outputs.VERSION }}
            REACT_APP_ENV=production
            REACT_APP_BACKEND_SERVER=${{ secrets.REACT_APP_BACKEND_SERVER }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ steps.version.outputs.VERSION }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ steps.version.outputs.VERSION }}
            ```

            ## Deploy

            ```bash
            ./deploy.sh ${{ steps.version.outputs.VERSION }} prod
            ```

            ## Rollback

            ```bash
            ./rollback.sh prod
            # or to a specific version:
            ./deploy.sh <previous-version> prod
            ```
