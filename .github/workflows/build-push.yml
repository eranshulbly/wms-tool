name: Build & Push Docker Images

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'   # triggers on version tags like 1.0.0, 1.2.3

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # ---------- Backend ----------
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./api-server-flask
          file: ./api-server-flask/Dockerfile
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/wms-backend:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}/wms-backend:latest

      # ---------- Frontend ----------
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./react-ui
          file: ./react-ui/Dockerfile.prod
          push: true
          build-args: |
            REACT_APP_BACKEND_SERVER=${{ secrets.REACT_APP_BACKEND_SERVER }}
            REACT_APP_VERSION=${{ steps.version.outputs.VERSION }}
            REACT_APP_ENV=production
          tags: |
            ${{ env.IMAGE_PREFIX }}/wms-frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}/wms-frontend:latest
